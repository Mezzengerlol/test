<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Aktieportfölj - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #10b981; /* Grön */
            --secondary: #1e293b;
            --accent: #3b82f6;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-color); color: var(--secondary); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .current-value { font-size: 2.2em; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .label { font-size: 0.85em; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background-color: #f8fafc; font-weight: 600; color: #475569; }
        .trend-up { color: #059669; background: #ecfdf5; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .trend-down { color: #dc2626; background: #fef2f2; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .chart-wrapper { height: 350px; margin-top: 20px; }
        button { cursor: pointer; transition: opacity 0.2s; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Aktieportfölj: Live Bevakning</h1>
        <p id="dateDisplay" style="color: #64748b;"></p>
    </header>

    <div class="stats-grid">
        <div class="card">
            <div class="label">Aktuellt Värde (B6)</div>
            <div id="liveValue" class="current-value">Hämtar...</div>
        </div>
        <div class="card">
            <div class="label">Systemstatus</div>
            <div id="statusMsg" style="margin-top:10px; font-weight:500;">Ansluter till Google Sheets...</div>
        </div>
    </div>

    <div class="card">
        <div class="label">Portföljutveckling (Månadsvis)</div>
        <div class="chart-wrapper">
            <canvas id="historyChart"></canvas>
        </div>
    </div>

    <div class="card" style="margin-top: 25px;">
        <div class="label">Historiklogg</div>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Månad</th>
                    <th>Värde</th>
                    <th>Förändring</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div style="text-align: right; margin-top: 20px;">
            <button onclick="clearHistory()" style="font-size: 11px; background: none; border: 1px solid #cbd5e1; color: #94a3b8; padding: 5px 10px; border-radius: 4px;">Nollställ historik</button>
        </div>
    </div>
</div>

<script>
    // REN LÄNK UTAN PROXY
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQe0EIYoPHqrzuLrHAQqp7ma964lpQih81YiKgBjO9_7SeAX-NWJLtWrl1AyFFUazhhQtQ70LRCc11A/pub?gid=1233054202&single=true&output=csv';

    async function updateDashboard() {
        try {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error('Kunde inte nå Google Sheets');
            
            const text = await response.text();
            const rows = text.split('\n').map(row => row.split(','));

            // Letar i Rad 6 (Index 5) efter första siffervärdet
            let foundValue = null;
            const targetRow = rows[5]; 
            
            if (targetRow) {
                for (let cell of targetRow) {
                    let cleanVal = cell.replace(/[^0-9,.]/g, '').replace(',', '.');
                    let num = parseFloat(cleanVal);
                    if (!isNaN(num) && num > 0) {
                        foundValue = num;
                        break; 
                    }
                }
            }

            if (foundValue) {
                document.getElementById('liveValue').innerText = foundValue.toLocaleString('sv-SE') + ' SEK';
                document.getElementById('statusMsg').innerText = "✅ Synkad med kalkylark";
                document.getElementById('statusMsg').style.color = "#10b981";
                
                checkAndSaveMonthly(foundValue);
                renderUI();
            } else {
                throw new Error('Hittade inget värde i rad 6');
            }

        } catch (err) {
            console.error("Fel:", err);
            document.getElementById('liveValue').innerText = "---";
            document.getElementById('statusMsg').innerText = "❌ Fel: " + err.message;
            document.getElementById('statusMsg').style.color = "#ef4444";
        }
    }

    function checkAndSaveMonthly(currentValue) {
        const now = new Date();
        const monthKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
        
        let history = JSON.parse(localStorage.getItem('portfolioHistory')) || [];
        const existingIndex = history.findIndex(item => item.month === monthKey);
        
        if (existingIndex > -1) {
            history[existingIndex].value = currentValue;
        } else {
            history.push({ month: monthKey, value: currentValue });
        }
        
        localStorage.setItem('portfolioHistory', JSON.stringify(history));
    }

    function renderUI() {
        const history = JSON.parse(localStorage.getItem('portfolioHistory')) || [];
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        // Skapa kopia för tabellen (nyast först)
        const displayHistory = [...history].reverse();

        displayHistory.forEach((item, index) => {
            const row = tableBody.insertRow();
            row.insertCell(0).innerText = item.month;
            row.insertCell(1).innerText = item.value.toLocaleString('sv-SE') + ' SEK';
            
            let changeHtml = '<span style="color:#94a3b8">---</span>';
            // Jämför med föregående månad (som ligger efter i den vända listan)
            if (index < displayHistory.length - 1) {
                const prevValue = displayHistory[index + 1].value;
                const diff = ((item.value - prevValue) / prevValue * 100).toFixed(2);
                const className = diff >= 0 ? 'trend-up' : 'trend-down';
                const prefix = diff >= 0 ? '+' : '';
                changeHtml = `<span class="${className}">${prefix}${diff}%</span>`;
            }
            row.insertCell(2).innerHTML = changeHtml;
        });

        // Rita diagram (äldst till nyast)
        const ctx = document.getElementById('historyChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: history.map(h => h.month),
                datasets: [{
                    label: 'Värde SEK',
                    data: history.map(h => h.value),
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    borderWidth: 3,
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#10b981',
                    pointRadius: 5,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: false, grid: { color: '#f1f5f9' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function clearHistory() {
        if(confirm("Vill du nollställa all insamlad månadshistorik?")) {
            localStorage.removeItem('portfolioHistory');
            location.reload();
        }
    }

    document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('sv-SE', { month: 'long', year: 'numeric', day: 'numeric' });
    updateDashboard();
    setInterval(updateDashboard, 300000); // Uppdatera var 5:e minut
</script>

</body>
</html>
