<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Aktieutveckling - UX Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #27ae60;
            --secondary: #2c3e50;
            --accent: #3498db;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--secondary); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .current-value { font-size: 2em; font-weight: bold; color: var(--primary); }
        .label { font-size: 0.9em; color: #7f8c8d; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .trend-up { color: var(--primary); font-weight: bold; }
        .chart-wrapper { height: 300px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Min Portföljutveckling</h1>
        <p id="dateDisplay"></p>
    </header>

    <div class="stats-grid">
        <div class="card">
            <div class="label">Aktuellt Värde (B6)</div>
            <div id="liveValue" class="current-value">Laddar...</div>
        </div>
        <div class="card">
            <div class="label">Status</div>
            <div id="statusMsg">Synkar med kalkylark...</div>
        </div>
    </div>

    <div class="card">
        <div class="label">Historisk Utveckling</div>
        <div class="chart-wrapper">
            <canvas id="historyChart"></canvas>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <div class="label">Månadshistorik</div>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Månad</th>
                    <th>Värde</th>
                    <th>Förändring</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <button onclick="clearHistory()" style="margin-top: 20px; font-size: 0.7em; background: none; border: none; color: #bdc3c7; cursor: pointer;">Rensa historik (nollställ)</button>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQe0EIYoPHqrzuLrHAQqp7ma964lpQih81YiKgBjO9_7SeAX-NWJLtWrl1AyFFUazhhQtQ70LRCc11A/pub?gid=1233054202&single=true&output=csv';

    async function updateDashboard() {
        try {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            const rows = text.split('\n').map(row => row.split(','));

            // Vi antar att totalvärdet finns i B6 (Rad index 5, Kolumn index 1)
            // Vi rensar bort eventuella citattecken eller mellanslag
            let rawValue = rows[5][1].replace(/[^0-9,.]/g, '').replace(',', '.');
            let totalValue = parseFloat(rawValue);

            if (isNaN(totalValue)) {
                // Prova C6 eller D6 om B6 är tom beroende på CSV-exporten
                totalValue = parseFloat(rows[5][2]) || parseFloat(rows[5][3]);
            }

            document.getElementById('liveValue').innerText = totalValue.toLocaleString('sv-SE') + ' SEK';
            
            checkAndSaveMonthly(totalValue);
            renderUI();

        } catch (err) {
            console.error("Fel vid hämtning:", err);
            document.getElementById('statusMsg').innerText = "Kunde inte hämta data.";
        }
    }

    function checkAndSaveMonthly(currentValue) {
        const now = new Date();
        const monthKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0'); // t.ex. "2023-10"
        
        let history = JSON.parse(localStorage.getItem('portfolioHistory')) || [];
        
        // Hitta om denna månad redan finns
        const existingIndex = history.findIndex(item => item.month === monthKey);
        
        if (existingIndex > -1) {
            // Uppdatera värdet för innevarande månad så det alltid är färskt
            history[existingIndex].value = currentValue;
        } else {
            // Det är en ny månad! Lägg till i listan
            history.push({ month: monthKey, value: currentValue });
            document.getElementById('statusMsg').innerText = "Ny månad sparad!";
        }
        
        localStorage.setItem('portfolioHistory', JSON.stringify(history));
    }

    function renderUI() {
        const history = JSON.parse(localStorage.getItem('portfolioHistory')) || [];
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        const labels = history.map(h => h.month);
        const values = history.map(h => h.value);

        history.reverse().forEach((item, index) => {
            const row = tableBody.insertRow();
            row.insertCell(0).innerText = item.month;
            row.insertCell(1).innerText = item.value.toLocaleString('sv-SE') + ' SEK';
            
            // Beräkna enkel procentuell skillnad från raden under (i tid)
            let change = "---";
            if (index < history.length - 1) {
                const prevValue = history[index + 1].value;
                const diff = ((item.value - prevValue) / prevValue * 100).toFixed(2);
                change = (diff > 0 ? '+' : '') + diff + '%';
            }
            const changeCell = row.insertCell(2);
            changeCell.innerText = change;
            if (change.includes('+')) changeCell.className = 'trend-up';
        });

        // Rita diagram
        const ctx = document.getElementById('historyChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Värde SEK',
                    data: values,
                    borderColor: '#27ae60',
                    backgroundColor: 'rgba(39, 174, 96, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    function clearHistory() {
        if(confirm("Vill du verkligen rensa all historik?")) {
            localStorage.removeItem('portfolioHistory');
            location.reload();
        }
    }

    // Kör vid start
    document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('sv-SE', { month: 'long', year: 'numeric', day: 'numeric' });
    updateDashboard();
    // Uppdatera var 10:e minut om sidan är öppen
    setInterval(updateDashboard, 600000);
</script>

</body>
</html>
