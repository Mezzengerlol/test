<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Portfölj</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root { --bg:#f8fafc; --card:#fff; --primary:#10b981; --text:#1e293b; }
body { font-family:sans-serif; background:var(--bg); margin:0; padding:20px; }
.container { max-width:1000px; margin:auto; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.card { background:var(--card); padding:20px; border-radius:12px; }
.full-width { grid-column:span 2; }
.val { font-size:2rem; font-weight:bold; color:var(--primary); }
table { width:100%; border-collapse:collapse; margin-top:10px; }
td, th { padding:10px; border-bottom:1px solid #eee; }
.up { color:green; }
.down { color:red; }
</style>
</head>

<body>
<div class="container">
<div class="grid">

<div class="card">
<div>Totalt värde</div>
<div id="liveValue" class="val">0 kr</div>
<div id="status">Laddar...</div>
</div>

<div class="card">
<canvas id="myChart" height="150"></canvas>
</div>

<div class="card full-width">
<table>
<thead>
<tr><th>Namn</th><th>Antal</th><th>Värde</th><th>%</th></tr>
</thead>
<tbody id="holdingsBody"></tbody>
<tfoot>
<tr>
<td>TOTALT</td>
<td id="totalCount">-</td>
<td id="totalSumFooter">0 kr</td>
<td>100%</td>
</tr>
</tfoot>
</table>
</div>

<div class="card full-width">
<table>
<thead>
<tr><th>Månad</th><th>Värde</th><th>Utveckling</th></tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>
</div>

<script>
const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQe0EIYoPHqrzuLrHAQqp7ma964lpQih81YiKgBjO9_7SeAX-NWJLtWrl1AyFFUazhhQtQ70LRCc11A/pub?gid=1233054202&single=true&output=csv';

async function load() {
    try {
        const res = await fetch(URL + '&t=' + Date.now());
        const text = await res.text();

        // Enkel men stabil CSV (Google Sheets = komma)
        const rows = text.split(/\r?\n/).map(r => r.split(','));

        let total = 0;
        let holdings = [];

        for (let i = 13; i <= 41; i++) {
            const row = rows[i];
            if (!row || row.length < 9) continue;

            const name = (row[3] || '').replace(/"/g,'').trim();
            if (!name || name.toLowerCase().includes('total')) continue;

            // ✅ FIXADE INDEX
            const amount = parseNum(row[7]);
            const value  = parseNum(row[8]);

            if (value > 0) {
                total += value;
                holdings.push({ name, amount, value });
            }
        }

        if (total === 0) {
            setStatus("⚠️ Ingen data hittades");
            return;
        }

        renderHoldings(holdings, total);
        updateTotals(total, holdings.length);
        save(total);
        renderHistory();

        setStatus("✅ Uppdaterad " + new Date().toLocaleTimeString());

    } catch (err) {
        console.error(err);
        setStatus("❌ Kunde inte hämta data");
    }
}

// ---------- HELPERS ----------

function parseNum(val) {
    if (!val) return 0;
    return parseFloat(
        val.replace(/\s/g,'')
           .replace(',', '.')
           .replace(/[^0-9.]/g,'')
    ) || 0;
}

function setStatus(txt) {
    document.getElementById('status').innerText = txt;
}

function format(n) {
    return n.toLocaleString('sv-SE') + ' kr';
}

// ---------- RENDER ----------

function renderHoldings(data, total) {
    const body = document.getElementById('holdingsBody');

    data.sort((a,b)=>b.value-a.value);

    body.innerHTML = data.map(h => {
        const pct = total > 0 ? ((h.value/total)*100).toFixed(1) : 0;
        return `
        <tr>
            <td>${h.name}</td>
            <td>${h.amount.toLocaleString('sv-SE')}</td>
            <td>${format(h.value)}</td>
            <td>${pct}%</td>
        </tr>`;
    }).join('');
}

function updateTotals(total, count) {
    document.getElementById('liveValue').innerText = format(total);
    document.getElementById('totalSumFooter').innerText = format(total);
    document.getElementById('totalCount').innerText = count + " st";
}

// ---------- HISTORY ----------

function save(v) {
    const key = 'portfolio_history_v4';
    const m = new Date().toLocaleDateString('sv-SE',{year:'numeric',month:'2-digit'});

    let h = JSON.parse(localStorage.getItem(key)) || [];
    const i = h.findIndex(x=>x.m===m);

    if (i>-1) h[i].v = v;
    else h.push({m,v});

    localStorage.setItem(key, JSON.stringify(h));
}

function renderHistory() {
    const key = 'portfolio_history_v4';
    let h = JSON.parse(localStorage.getItem(key)) || [];
    let list = [...h].reverse();

    const body = document.getElementById('tableBody');

    body.innerHTML = list.map((d,i)=>{
        let diff = "-";
        if (i < list.length-1) {
            const p = ((d.v - list[i+1].v)/list[i+1].v*100).toFixed(2);
            diff = `<span class="${p>=0?'up':'down'}">${p>=0?'+':''}${p}%</span>`;
        }
        return `<tr><td>${d.m}</td><td>${format(d.v)}</td><td>${diff}</td></tr>`;
    }).join('');

    drawChart(h);
}

// ---------- CHART ----------

function drawChart(h) {
    const ctx = document.getElementById('myChart').getContext('2d');

    if (window.chart) window.chart.destroy();

    window.chart = new Chart(ctx, {
        type:'line',
        data:{
            labels:h.map(x=>x.m),
            datasets:[{
                data:h.map(x=>x.v),
                borderColor:'#10b981',
                backgroundColor:'rgba(16,185,129,0.1)',
                fill:true,
                tension:0.3
            }]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{x:{display:false},y:{display:false}}
        }
    });
}

// ---------- START ----------

load();
setInterval(load, 300000);
</script>

</body>
</html>
