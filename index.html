<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktieportfölj Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #10b981; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .val { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .up { color: #059669; font-weight: bold; }
        .down { color: #dc2626; font-weight: bold; }
        #chart-container { height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="label">Aktuellt Portföljvärde</div>
        <div id="liveValue" class="val">Hämtar data...</div>
        <div id="status" style="font-size: 0.8rem;">Ansluter till Google...</div>
    </div>

    <div class="card">
        <div class="label">Historisk utveckling</div>
        <div id="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <div class="card">
        <div class="label">Månadslogg</div>
        <table>
            <thead><tr><th>Månad</th><th>Värde</th><th>+/-</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQe0EIYoPHqrzuLrHAQqp7ma964lpQih81YiKgBjO9_7SeAX-NWJLtWrl1AyFFUazhhQtQ70LRCc11A/pub?gid=1233054202&single=true&output=csv';

    async function load() {
        try {
            const res = await fetch(URL + '&cachebuster=' + Date.now());
            if (!res.ok) throw new Error('Kunde inte nå Google Sheets');
            
            const text = await res.text();
            // Vi delar upp rader och trimmar bort extra mellanslag
            const rows = text.split(/\r?\n/).map(r => r.split(/[;,]/).map(cell => cell.trim()));
            
            let totalSum = 0;
            let count = 0;

            // VI GÅR IGENOM RAD 14 TILL 42 (Index 13 till 41)
            for (let i = 13; i <= 41; i++) {
                let row = rows[i];
                if (row) {
                    // Vi letar i kolumn I (index 8), men kollar även kolumn H (7) och J (9) 
                    // ifall exporten har förskjutit cellerna.
                    // Vi tar det största talet på raden som ser ut som ett aktievärde.
                    let rowValues = [];
                    
                    // Vi kollar kolumnerna i närheten av "I"
                    [7, 8, 9, 10].forEach(colIndex => {
                        if (row[colIndex]) {
                            let clean = row[colIndex].replace(/\s/g, '').replace(',', '.').replace(/[^0-9.]/g, '');
                            let num = parseFloat(clean);
                            if (!isNaN(num) && num > 0) rowValues.push(num);
                        }
                    });

                    if (rowValues.length > 0) {
                        // Vi antar att det högsta talet på raden i det området är värdet
                        totalSum += Math.max(...rowValues);
                        count++;
                    }
                }
            }

            if (totalSum > 0) {
                document.getElementById('liveValue').innerText = totalSum.toLocaleString('sv-SE', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' SEK';
                document.getElementById('status').innerText = `✅ Summerade ${count} rader från bevakningslistan kl ${new Date().toLocaleTimeString()}`;
                document.getElementById('status').style.color = "#10b981";
                save(totalSum);
                render();
            } else {
                // Om summeringen misslyckas, testa att hämta summan från rad 6 som backup
                throw new Error('Kunde inte summera raderna. Kontrollera att kolumn I innehåller siffror.');
            }
        } catch (e) {
            document.getElementById('status').innerText = "❌ Fel: " + e.message;
            document.getElementById('status').style.color = "#ef4444";
        }
    }

    // ... (resten av funktionerna save, render är samma som tidigare)
    function save(v) {
        const m = new Date().toLocaleDateString('sv-SE', {year:'numeric', month:'2-digit'});
        let h = JSON.parse(localStorage.getItem('stocks_v4')) || [];
        let i = h.findIndex(x => x.m === m);
        if (i > -1) h[i].v = v; else h.push({ m, v });
        localStorage.setItem('stocks_v4', JSON.stringify(h));
    }

    function render() {
        let h = JSON.parse(localStorage.getItem('stocks_v4')) || [];
        const body = document.getElementById('tableBody');
        let displayH = [...h].reverse();
        body.innerHTML = displayH.map((d, i) => {
            let diff = "---";
            if (i < displayH.length - 1) {
                let p = ((d.v - displayH[i+1].v) / displayH[i+1].v * 100).toFixed(2);
                diff = `<span class="${p >= 0 ? 'up' : 'down'}">${p >= 0 ? '+' : ''}${p}%</span>`;
            }
            return `<tr><td>${d.m}</td><td>${d.v.toLocaleString('sv-SE')} kr</td><td>${diff}</td></tr>`;
        }).join('');
        const ctx = document.getElementById('myChart');
        if (window.chartObj) window.chartObj.destroy();
        window.chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: h.map(x => x.m),
                datasets: [{ label: 'Värde', data: h.map(x => x.v), borderColor: '#10b981', fill: false, tension: 0.3 }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
    load();
</script>
</body>
</html>
