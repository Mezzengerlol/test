<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktieportfölj Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #10b981; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .val { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .up { color: #059669; font-weight: bold; }
        .down { color: #dc2626; font-weight: bold; }
        #chart-container { height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="label">Aktuellt Portföljvärde</div>
        <div id="liveValue" class="val">Hämtar data...</div>
        <div id="status" style="font-size: 0.8rem;">Ansluter till Google...</div>
    </div>

    <div class="card">
        <div class="label">Historisk utveckling</div>
        <div id="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <div class="card">
        <div class="label">Månadslogg</div>
        <table>
            <thead><tr><th>Månad</th><th>Värde</th><th>+/-</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQe0EIYoPHqrzuLrHAQqp7ma964lpQih81YiKgBjO9_7SeAX-NWJLtWrl1AyFFUazhhQtQ70LRCc11A/pub?gid=1233054202&single=true&output=csv';

    async function load() {
        try {
            const res = await fetch(URL + '&cachebuster=' + Date.now());
            if (!res.ok) throw new Error('Kunde inte nå Google Sheets');
            
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(/[;,]/));
            
            let totalSum = 0;
            let foundAnyValue = false;

            // Vi går igenom varje rad och tittar på kolumn I (vilket är index 8)
            // Vi börjar från rad 14 (index 13) där dina aktier börjar
            for (let i = 13; i < rows.length; i++) {
                let row = rows[i];
                if (row && row[8]) { // Kolumn I
                    let clean = row[8].replace(/\s/g, '').replace(',', '.').replace(/[^0-9.]/g, '');
                    let num = parseFloat(clean);
                    if (!isNaN(num)) {
                        totalSum += num;
                        foundAnyValue = true;
                    }
                }
            }

            // Om kolumn I var tom, testa att leta efter summan i rad 6 som förut
            if (totalSum === 0) {
                const row6 = rows[5];
                if (row6) {
                    for (let cell of row6) {
                        let clean = cell.replace(/\s/g, '').replace(',', '.').replace(/[^0-9.]/g, '');
                        let num = parseFloat(clean);
                        if (!isNaN(num) && num > 100) { totalSum = num; foundAnyValue = true; break; }
                    }
                }
            }

            if (foundAnyValue && totalSum > 0) {
                document.getElementById('liveValue').innerText = totalSum.toLocaleString('sv-SE', {minimumFractionDigits: 2}) + ' SEK';
                document.getElementById('status').innerText = "✅ Beräknad från kolumn I: " + new Date().toLocaleTimeString();
                document.getElementById('status').style.color = "#10b981";
                save(totalSum);
                render();
            } else {
                throw new Error('Kunde inte hitta några värden i kolumn I eller rad 6');
            }
        } catch (e) {
            document.getElementById('status').innerText = "❌ Fel: " + e.message;
            document.getElementById('status').style.color = "#ef4444";
        }
    }

    function save(v) {
        const m = new Date().toLocaleDateString('sv-SE', {year:'numeric', month:'2-digit'});
        let h = JSON.parse(localStorage.getItem('stocks_v3')) || [];
        let i = h.findIndex(x => x.m === m);
        if (i > -1) h[i].v = v; else h.push({ m, v });
        localStorage.setItem('stocks_v3', JSON.stringify(h));
    }

    function render() {
        let h = JSON.parse(localStorage.getItem('stocks_v3')) || [];
        const body = document.getElementById('tableBody');
        let displayH = [...h].reverse();
        
        body.innerHTML = displayH.map((d, i) => {
            let diff = "---";
            if (i < displayH.length - 1) {
                let p = ((d.v - displayH[i+1].v) / displayH[i+1].v * 100).toFixed(2);
                diff = `<span class="${p >= 0 ? 'up' : 'down'}">${p >= 0 ? '+' : ''}${p}%</span>`;
            }
            return `<tr><td>${d.m}</td><td>${d.v.toLocaleString('sv-SE')} kr</td><td>${diff}</td></tr>`;
        }).join('');

        const ctx = document.getElementById('myChart');
        if (window.chartObj) window.chartObj.destroy();
        window.chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: h.map(x => x.m),
                datasets: [{ 
                    label: 'Värde SEK', 
                    data: h.map(x => x.v), 
                    borderColor: '#10b981', 
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    fill: true,
                    tension: 0.3 
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    load();
</script>
</body>
</html>
