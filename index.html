<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktieportfölj Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #10b981; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .val { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .up { color: #059669; font-weight: bold; }
        .down { color: #dc2626; font-weight: bold; }
        #chart-container { height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="label">Aktuellt Portföljvärde</div>
        <div id="liveValue" class="val">Hämtar data...</div>
        <div id="status" style="font-size: 0.8rem;">Ansluter till Google...</div>
    </div>

    <div class="card">
        <div class="label">Historisk utveckling</div>
        <div id="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <div class="card">
        <div class="label">Månadslogg</div>
        <table>
            <thead><tr><th>Månad</th><th>Värde</th><th>+/-</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQe0EIYoPHqrzuLrHAQqp7ma964lpQih81YiKgBjO9_7SeAX-NWJLtWrl1AyFFUazhhQtQ70LRCc11A/pub?gid=1233054202&single=true&output=csv';

    async function load() {
        try {
            const res = await fetch(URL + '&cachebuster=' + Date.now());
            if (!res.ok) throw new Error('Kunde inte nå Google Sheets');
            
            const text = await res.text();
            
            // Delar upp i rader
            const rows = text.split(/\r?\n/);
            const row6 = rows[5]; // Index 5 = Rad 6
            
            if (!row6) throw new Error('Rad 6 hittades inte i dokumentet');

            // Vi delar upp raden med både komma och semikolon för att vara säkra
            const cells = row6.split(/[;,]/);
            
            let foundVal = null;
            // Vi letar efter det första talet i rad 6 (vi hoppar över första cellen som ofta är text)
            for (let i = 1; i < cells.length; i++) {
                let clean = cells[i].replace(/\s/g, '').replace(',', '.').replace(/[^0-9.]/g, '');
                let num = parseFloat(clean);
                if (!isNaN(num) && num > 10) { // Vi antar att portföljen är värd mer än 10kr
                    foundVal = num;
                    break;
                }
            }

            if (foundVal) {
                document.getElementById('liveValue').innerText = foundVal.toLocaleString('sv-SE') + ' SEK';
                document.getElementById('status').innerText = "✅ Synkad: " + new Date().toLocaleTimeString();
                document.getElementById('status').style.color = "#10b981";
                save(foundVal);
                render();
            } else {
                document.getElementById('status').innerText = "⚠️ Hittade inget tal i rad 6. Kontrollera cell B6, C6 eller D6.";
            }
        } catch (e) {
            document.getElementById('status').innerText = "❌ Fel: " + e.message;
            document.getElementById('status').style.color = "#ef4444";
        }
    }

    function save(v) {
        const m = new Date().toLocaleDateString('sv-SE', {year:'numeric', month:'2-digit'});
        let h = JSON.parse(localStorage.getItem('stocks_v2')) || [];
        if (!h.find(x => x.m === m)) {
            h.push({ m, v });
            localStorage.setItem('stocks_v2', JSON.stringify(h));
        } else {
            // Uppdatera värdet för innevarande månad
            h[h.findIndex(x => x.m === m)].v = v;
            localStorage.setItem('stocks_v2', JSON.stringify(h));
        }
    }

    function render() {
        let h = JSON.parse(localStorage.getItem('stocks_v2')) || [];
        const body = document.getElementById('tableBody');
        
        // Sortera historik så nyast är först i tabellen
        let displayH = [...h].reverse();
        
        body.innerHTML = displayH.map((d, i) => {
            let diff = "---";
            if (i < displayH.length - 1) {
                let prevV = displayH[i+1].v;
                let p = ((d.v - prevV) / prevV * 100).toFixed(2);
                diff = `<span class="${p >= 0 ? 'up' : 'down'}">${p >= 0 ? '+' : ''}${p}%</span>`;
            }
            return `<tr><td>${d.m}</td><td>${d.v.toLocaleString('sv-SE')} kr</td><td>${diff}</td></tr>`;
        }).join('');

        // Diagram (äldst till nyast)
        const ctx = document.getElementById('myChart');
        if (window.chartObj) window.chartObj.destroy();
        window.chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: h.map(x => x.m),
                datasets: [{ 
                    label: 'Värde SEK', 
                    data: h.map(x => x.v), 
                    borderColor: '#10b981', 
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    fill: true,
                    tension: 0.3 
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: false } }
            }
        });
    }

    load();
</script>
</body>
</html>
