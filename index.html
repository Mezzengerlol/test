<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktieportfölj Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #10b981; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .val { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .up { color: #059669; font-weight: bold; }
        .down { color: #dc2626; font-weight: bold; }
        #chart-container { height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="label">Aktuellt Portföljvärde</div>
        <div id="liveValue" class="val">Hämtar data...</div>
        <div id="status" style="font-size: 0.8rem;">Ansluter till Google...</div>
    </div>

    <div class="card">
        <div class="label">Historisk utveckling</div>
        <div id="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <div class="card">
        <div class="label">Månadslogg</div>
        <table>
            <thead><tr><th>Månad</th><th>Värde</th><th>+/-</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQe0EIYoPHqrzuLrHAQqp7ma964lpQih81YiKgBjO9_7SeAX-NWJLtWrl1AyFFUazhhQtQ70LRCc11A/pub?gid=1233054202&single=true&output=csv';

    async function load() {
        try {
            const res = await fetch(URL);
            const data = await res.text();
            const rows = data.split('\n').map(r => r.split(','));
            
            // Vi letar i rad 6 (index 5)
            let val = parseFloat(rows[5][1].replace(/[^0-9,.]/g, '').replace(',', '.')) || 
                      parseFloat(rows[5][2]) || parseFloat(rows[5][3]);

            if (val) {
                document.getElementById('liveValue').innerText = val.toLocaleString('sv-SE') + ' SEK';
                document.getElementById('status').innerText = "✅ Uppdaterad: " + new Date().toLocaleTimeString();
                save(val);
                render();
            }
        } catch (e) {
            document.getElementById('status').innerText = "❌ Fel vid hämtning";
        }
    }

    function save(v) {
        const m = new Date().toISOString().slice(0, 7); // t.ex "2024-03"
        let h = JSON.parse(localStorage.getItem('stocks')) || [];
        let i = h.findIndex(x => x.m === m);
        if (i > -1) h[i].v = v; else h.push({ m, v });
        localStorage.setItem('stocks', JSON.stringify(h));
    }

    function render() {
        let h = JSON.parse(localStorage.getItem('stocks')) || [];
        const body = document.getElementById('tableBody');
        body.innerHTML = h.reverse().map((d, i) => {
            let diff = "---";
            if (i < h.length - 1) {
                let p = ((d.v - h[i+1].v) / h[i+1].v * 100).toFixed(2);
                diff = `<span class="${p >= 0 ? 'up' : 'down'}">${p >= 0 ? '+' : ''}${p}%</span>`;
            }
            return `<tr><td>${d.m}</td><td>${d.v.toLocaleString()} kr</td><td>${diff}</td></tr>`;
        }).join('');

        h.reverse();
        new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: {
                labels: h.map(x => x.m),
                datasets: [{ label: 'Värde', data: h.map(x => x.v), borderColor: '#10b981', fill: false, tension: 0.3 }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    load();
</script>
</body>
</html>
